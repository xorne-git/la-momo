<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 40" width="100%" height="100%" fill="none">
  <style>
    .brand-title {
      font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 13.5px;
      letter-spacing: 0.15em;
      fill: #121313;
    }
    .brand-sub {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-weight: 500;
      font-size: 7.5px;
      letter-spacing: 0.08em;
      fill: #D16436;
    }
  </style>
  
  <g id="logo-container">
    <!-- Icone M double-shed alignée et ajustée (translation -4px intégrée) -->
    <path
      d="M 6 24 L 23 11 L 23 24 L 40 11 L 40 24"
      stroke="#D16436"
      stroke-width="2.8"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    
    <!-- Groupe Textes avec l'espacement parfait de 11px par rapport à l'icône -->
    <g transform="translate(51, 0)">
      <!-- Ligne 1 : Titre principal -->
      <text x="0" y="19" class="brand-title">LES ATELIERS DE LA MORINERIE</text>
      
      <!-- Ligne 2 : Sous-titre -->
      <text x="0" y="30" class="brand-sub">SAINT-PIERRE-DES-CORPS • COOPÉRATIVE SOLIDAIRE</text>
    </g>
  </g>
</svg>
